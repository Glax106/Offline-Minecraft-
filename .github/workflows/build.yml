name: Build Launcher to EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with Logo and Background
      run: |
        pyinstaller --onefile --noconsole --icon="logo.ico" --add-data "background.png;." --add-data "logo.ico;." main.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: Atsenor-Launcher
        path: dist/main.exe
        
