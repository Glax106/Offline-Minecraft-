name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install and Build
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pyinstaller --onefile --noconsole --add-data "background.png;." main.py
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Atsenor-Launcher
        path: dist/main.exe
        
